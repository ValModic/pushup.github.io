<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistika - Pushup</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
        }
        canvas {
            max-width: 100%;
            margin-bottom: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            color: #333;
        }
        .chart-container {
            margin-bottom: 40px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Statistika sklecev</h1>

    <button onclick="window.location.href='index.html'">Domov</button>

    <div class="chart-container">
        <h2>Mesecna statistika</h2>
        <canvas id="monthlyChart"></canvas>
    </div>

    <div class="chart-container">
        <h2>Tedenska statistika</h2>
        <canvas id="weeklyChart"></canvas>
    </div>

</div>

<script>
// Funkcija za nalaganje podatkov iz localStorage
function loadData() {
    const savedData = localStorage.getItem('exerciseData');
    if (savedData) {
        exerciseData = JSON.parse(savedData);
        updateStatistics();
        updateMonthlyChart();
        updateWeeklyChart();
    }
}

// Funkcija za pridobivanje mesečnih podatkov
function getMonthlyData() {
    let monthlyData = [];
    let monthlyLabels = [];
    let monthlyMaxSets = [];
    
    const months = {};

    Object.keys(exerciseData).forEach(date => {
        const day = new Date(date);
        const month = day.getMonth(); // Mesec (0 - januar, 1 - februar, ...)

        if (!months[month]) {
            months[month] = { totalReps: 0, maxSets: [] };
        }

        months[month].totalReps += exerciseData[date].totalReps;
        months[month].maxSets.push(...exerciseData[date].maxSets);
    });

    for (const month in months) {
        monthlyData.push(months[month].totalReps);
        monthlyMaxSets.push(Math.max(...months[month].maxSets));
        monthlyLabels.push(`Mesec ${parseInt(month) + 1}`);
    }

    return { monthlyData, monthlyLabels, monthlyMaxSets };
}

// Funkcija za prikaz mesečnega grafa
function updateMonthlyChart() {
    const { monthlyData, monthlyLabels, monthlyMaxSets } = getMonthlyData();
    const ctx = document.getElementById('monthlyChart').getContext('2d');

    const monthlyChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: monthlyLabels,
            datasets: [
                {
                    label: 'Število ponovitev na mesec',
                    data: monthlyData,
                    borderColor: 'rgba(75, 192, 192, 1)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderWidth: 1
                },
                {
                    label: 'Max set (mesečno)',
                    data: monthlyMaxSets,
                    borderColor: 'rgba(255, 99, 132, 1)',
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    borderWidth: 1
                }
            ]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}

// Funkcija za pridobivanje tedenskih podatkov (7 dni v tednu)
function getWeeklyData() {
    let weeklyData = [];
    let weeklyLabels = [];
    let weeklyMaxSets = [];
    
    let currentWeekData = [];
    let currentMaxSet = 0;
    let currentWeekStart = null;
    let currentWeekLabel = null;

    Object.keys(exerciseData).forEach(date => {
        const day = new Date(date);
        const weekStart = day.getDate() - day.getDay(); // Ponedeljek za trenutni teden

        if (!currentWeekStart || currentWeekStart !== weekStart) {
            if (currentWeekData.length > 0) {
                // Dodaj podatke za prejšnji teden
                weeklyData.push(currentWeekData);
                weeklyMaxSets.push(currentMaxSet);
                weeklyLabels.push(currentWeekLabel);  // Dodaj oznako tedna
            }
            currentWeekData = Array(7).fill(0); // Začni nov teden z 0
            currentMaxSet = 0;
            currentWeekStart = weekStart;
            currentWeekLabel = `Teden ${Math.floor(day.getDate() / 7) + 1}`;
        }

        const dayOfWeek = day.getDay(); // Dan v tednu (0 - nedelja, 1 - ponedeljek, ...)
        currentWeekData[dayOfWeek] = exerciseData[date].totalReps;
        currentMaxSet = Math.max(currentMaxSet, ...exerciseData[date].maxSets);
    });

    if (currentWeekData.length > 0) {
        weeklyData.push(currentWeekData);
        weeklyMaxSets.push(currentMaxSet);
        weeklyLabels.push(currentWeekLabel);  // Dodaj zadnji teden
    }

    return { weeklyData, weeklyLabels, weeklyMaxSets };
}

// Funkcija za prikaz tedenskega grafa (7 dni v tednu)
function updateWeeklyChart() {
    const { weeklyData, weeklyLabels, weeklyMaxSets } = getWeeklyData();
    const ctx = document.getElementById('weeklyChart').getContext('2d');

    const weeklyChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: weeklyLabels,
            datasets: [
                {
                    label: 'Število ponovitev na teden (7 dni)',
                    data: weeklyData.flat(), // Flatten the array to show data for each day
                    borderColor: 'rgba(75, 192, 192, 1)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderWidth: 1
                },
                {
                    label: 'Max set (tedensko)',
                    data: weeklyMaxSets,
                    borderColor: 'rgba(255, 99, 132, 1)',
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    borderWidth: 1
                }
            ]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}

// Priprava in nalaganje podatkov
let exerciseData = {}; // Zbirka podatkov za vsak datum
window.onload = loadData;
</script>

</body>
</html>
