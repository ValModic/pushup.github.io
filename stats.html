<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistika - Pushup</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Statistika sklecev</h1>

    <button class="domov" onclick="window.location.href='index.html'">Domov</button>
    <div class="stats-container">
        <p>Skupaj ponovitev: <span id="totalReps">0</span></p>
        <p>Povprečje na dan: <span id="averagePerDay">0</span></p>
    </div>

    <div class="chart-container">
        <h2>Mesečna statistika</h2>
        <canvas id="monthlyChart"></canvas>
    </div>

    <div class="chart-container">
        <h2>Tedenska statistika</h2>
        <canvas id="weeklyChart"></canvas>
    </div>

    <div class="chart-container">
        <h2>Primerjava tednov</h2>
        <canvas id="weeklyComparisonChart"></canvas>
    </div>

    <div class="chart-container">
        <h2>Primerjava mesecev</h2>
        <canvas id="monthlyComparisonChart"></canvas>
    </div>

</div>

<script>
let exerciseData = {};

function loadData() {
    const savedData = localStorage.getItem('exerciseData');
    if (savedData) {
        exerciseData = JSON.parse(savedData);
        updateStatistics();
        updateMonthlyChart();
        updateWeeklyChart();
        updateWeeklyComparisonChart();
        updateMonthlyComparisonChart();
    }
}

function getMonthlyData() {
    let monthlyData = [];
    let monthlyMax = [];
    let monthlyLabels = [];
    const months = {};

    Object.keys(exerciseData).forEach(date => {
        const day = new Date(date);
        const month = day.getMonth();
        if (!months[month]) {
            months[month] = { totalReps: 0, maxSet: 0 };
        }
        months[month].totalReps += exerciseData[date].totalReps;
        months[month].maxSet = Math.max(months[month].maxSet, ...exerciseData[date].maxSets);
    });

    for (let i = 0; i < 12; i++) {
        monthlyLabels.push(`Mesec ${i + 1}`);
        monthlyData.push(months[i] ? months[i].totalReps : 0);
        monthlyMax.push(months[i] ? months[i].maxSet : 0);
    }

    return { monthlyData, monthlyMax, monthlyLabels };
}

function updateMonthlyComparisonChart() {
    const { monthlyData, monthlyMax, monthlyLabels } = getMonthlyData();
    const ctx = document.getElementById('monthlyComparisonChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: monthlyLabels,
            datasets: [
                { label: 'Skupaj ponovitev', data: monthlyData, backgroundColor: 'rgba(75, 192, 192, 0.5)' },
                { label: 'Max sklec v setu', data: monthlyMax, backgroundColor: 'rgba(255, 99, 132, 0.5)' }
            ]
        },
        options: { scales: { y: { beginAtZero: true } } }
    });
}

function getWeeklyComparisonData() {
    let weeklyData = [];
    let weeklyMax = [];
    let weeklyLabels = [];
    let weekTotals = {};

    Object.keys(exerciseData).forEach(date => {
        const day = new Date(date);
        const week = `${day.getFullYear()}-W${Math.ceil(day.getDate() / 7)}`;
        if (!weekTotals[week]) {
            weekTotals[week] = { totalReps: 0, maxSet: 0 };
        }
        weekTotals[week].totalReps += exerciseData[date].totalReps;
        weekTotals[week].maxSet = Math.max(weekTotals[week].maxSet, ...exerciseData[date].maxSets);
    });

    Object.keys(weekTotals).forEach(week => {
        weeklyLabels.push(week);
        weeklyData.push(weekTotals[week].totalReps);
        weeklyMax.push(weekTotals[week].maxSet);
    });

    return { weeklyData, weeklyMax, weeklyLabels };
}

function updateWeeklyComparisonChart() {
    const { weeklyData, weeklyMax, weeklyLabels } = getWeeklyComparisonData();
    const ctx = document.getElementById('weeklyComparisonChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: weeklyLabels,
            datasets: [
                { label: 'Skupaj ponovitev', data: weeklyData, backgroundColor: 'rgba(75, 192, 192, 0.5)' },
                { label: 'Max sklec v setu', data: weeklyMax, backgroundColor: 'rgba(255, 99, 132, 0.5)' }
            ]
        },
        options: { scales: { y: { beginAtZero: true } } }
    });
}

window.onload = loadData;
</script>
</body>
</html>
