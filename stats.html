<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistika - Pushup</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Statistika sklecev</h1>

    <button class="domov" onclick="window.location.href='index.html'">Domov</button>
    <div class="stats-container">
        <p>Skupaj ponovitev: <span id="totalReps">0</span></p>
        <p>Povprečje na dan: <span id="averagePerDay">0</span></p>
    </div>

    <div class="chart-container">
        <h2>Mesečna statistika</h2>
        <canvas id="monthlyChart"></canvas>
    </div>

    <div class="chart-container">
        <h2>Tedenska statistika</h2>
        <canvas id="weeklyChart"></canvas>
    </div>

</div>

<script>
let exerciseData = {};

function loadData() {
    const savedData = localStorage.getItem('exerciseData');
    if (savedData) {
        exerciseData = JSON.parse(savedData);
        updateStatistics();
        updateMonthlyChart();
        updateWeeklyChart();
    }
}

function getMonthlyData() {
    let monthlyData = [];
    let monthlyLabels = [];
    const today = new Date();
    const currentMonth = today.getMonth();

    for (let i = 1; i <= 31; i++) {
        const dateStr = new Date(today.getFullYear(), currentMonth, i).toISOString().split('T')[0];
        if (exerciseData[dateStr]) {
            monthlyData.push(exerciseData[dateStr].totalReps);
        } else {
            monthlyData.push(0);
        }
        monthlyLabels.push(i);
    }
    return { monthlyData, monthlyLabels };
}

function updateMonthlyChart() {
    const { monthlyData, monthlyLabels } = getMonthlyData();
    const ctx = document.getElementById('monthlyChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: monthlyLabels,
            datasets: [{
                label: 'Ponovitve na dan',
                data: monthlyData,
                backgroundColor: 'rgba(75, 192, 192, 0.5)',
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1
            }]
        },
        options: { scales: { y: { beginAtZero: true } } }
    });
}

function getWeeklyData() {
    let weeklyData = [];
    let weeklyLabels = [];
    const today = new Date();
    const dayOfWeek = today.getDay(); // 0 = nedelja, 1 = ponedeljek, ...
    const monday = new Date(today);
    monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1)); // Dobimo ponedeljek

    for (let i = 0; i < 7; i++) {
        const date = new Date(monday);
        date.setDate(monday.getDate() + i);
        const dateStr = date.toISOString().split('T')[0];
        
        if (exerciseData[dateStr]) {
            weeklyData.push(exerciseData[dateStr].totalReps);
        } else {
            weeklyData.push(0);
        }
        weeklyLabels.push(date.toLocaleDateString('sl-SI', { weekday: 'short' }));
    }
    return { weeklyData, weeklyLabels };
}

function updateWeeklyChart() {
    const { weeklyData, weeklyLabels } = getWeeklyData();
    const ctx = document.getElementById('weeklyChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: weeklyLabels,
            datasets: [{
                label: 'Ponovitve na dan',
                data: weeklyData,
                borderColor: 'rgba(255, 99, 132, 1)',
                backgroundColor: 'rgba(255, 99, 132, 0.2)',
                borderWidth: 1
            }]
        },
        options: { scales: { y: { beginAtZero: true } } }
    });
}

function updateStatistics() {
    let totalReps = 0;
    let totalDays = 0;
    
    Object.values(exerciseData).forEach(data => {
        totalReps += data.totalReps;
        totalDays++;
    });

    const averageRepsPerDay = totalDays > 0 ? totalReps / totalDays : 0;
    document.getElementById('totalReps').textContent = totalReps;
    document.getElementById('averagePerDay').textContent = averageRepsPerDay.toFixed(2);
}

window.onload = loadData;
</script>
</body>
</html>
